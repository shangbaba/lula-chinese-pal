<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="卢拉陪读">
  <meta name="theme-color" content="#E8423A">
  <title>Lula Chinese Pal · 卢拉陪读</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/views.css">
</head>
<body>
  <div id="app">
    <div id="view-profile" class="view hidden"></div>
    <div id="view-library" class="view hidden"></div>
    <div id="view-pages" class="view hidden"></div>
    <div id="view-reader" class="view hidden"></div>
    <div id="view-settings" class="view hidden"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
